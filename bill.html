<!DOCTYPE html>
<html>
<head>
    <title>Bill</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Your Bill</h1>

<div id="billBox"></div>

<script>
const data = JSON.parse(localStorage.getItem("bill"));

document.getElementById("billBox").innerHTML = `
    <p>Total: ₹${data.total}</p>
    <p>GST (18%): ₹${data.gst}</p>
    <h2>Final Amount: ₹${data.finalAmount}</h2>
    <h3>🙏 Thank You! Visit Again 🙏</h3>
`;
</script>

</body>
</html>
